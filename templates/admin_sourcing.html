<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sourcing Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #030712;
            --sidebar-bg: #0f172a;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --blue-primary: #3b82f6;
            --blue-glow: rgba(59, 130, 246, 0.4);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(59, 130, 246, 0.15);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [dir="rtl"] { font-family: 'Cairo', sans-serif; }
        [dir="ltr"] { font-family: 'Inter', sans-serif; }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
            transition: var(--transition);
        }

        /* Sidebar Styling */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            height: 100vh;
            position: fixed;
            left: -280px; /* Hidden by default (LTR) */
            top: 0;
            z-index: 2000;
            padding: 30px 20px;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        [dir="rtl"] .sidebar { left: auto; right: -280px; border-right: none; border-left: 1px solid var(--border); box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        .sidebar.active { left: 0; }
        [dir="rtl"] .sidebar.active { right: 0; left: auto; }

        .sidebar-header {
            padding-bottom: 30px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
            text-align: center;
        }

        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--blue-primary);
        }

        .menu-list { list-style: none; flex: 1; }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-radius: 12px;
            color: var(--text-dim);
            text-decoration: none;
            margin-bottom: 10px;
            transition: var(--transition);
            cursor: pointer;
        }

        .menu-item i { font-size: 1.2rem; }
        .menu-item:hover, .menu-item.active {
            background: rgba(59, 130, 246, 0.1);
            color: var(--blue-primary);
        }

        /* Top Bar Styling */
        .topbar {
            position: fixed; top: 20px; left: 20px; right: 20px; height: 65px;
            background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--border);
            border-radius: 20px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .hamburger { font-size: 1.5rem; color: var(--blue-primary); cursor: pointer; }
        .page-title { font-size: 1.1rem; font-weight: 700; color: var(--text-main); }

        /* Main Content */
        main {
            flex: 1; padding: 105px 20px 40px; max-width: 900px;
            margin: 0 auto; width: 100%; transition: var(--transition);
        }

        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(3px);
            z-index: 1500; display: none;
        }
        .overlay.active { display: block; }

        /* Stats Cards */
        .grid-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card {
            background: var(--glass-bg); border: 1px solid var(--border); border-radius: 24px;
            padding: 25px 15px; text-align: center;
        }
        .stat-card i { font-size: 2rem; color: var(--blue-primary); margin-bottom: 12px; }
        .stat-value { font-size: 1.8rem; font-weight: 800; color: #fff; }
        .stat-label { font-size: 0.8rem; color: var(--text-dim); margin-top: 5px; }

        .card { background: var(--glass-bg); border: 1px solid var(--border); border-radius: 24px; padding: 25px; margin-bottom: 25px; }
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .section-header h3 { font-size: 1.1rem; color: var(--blue-primary); }

        .btn-add {
            background: var(--blue-primary); color: white; border: none; padding: 12px 20px;
            border-radius: 12px; font-weight: 600; display: flex; align-items: center;
            gap: 8px; cursor: pointer; text-decoration: none; font-size: 0.9rem;
        }

        .list-container { display: flex; flex-direction: column; gap: 15px; }
        .list-item {
            background: linear-gradient(145deg, rgba(255,255,255,0.02), rgba(255,255,255,0.05));
            border: 1px solid var(--border);
            border-right: 4px solid var(--blue-primary);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .list-item:hover {
            transform: translateY(-3px);
            background: rgba(255,255,255,0.07);
            border-color: var(--blue-primary);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.15);
        }

        .item-info { display: flex; flex-direction: column; gap: 5px; }
        .item-info h4 { 
            font-size: 1.1rem; 
            font-weight: 700; 
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .item-info h4 i { color: var(--blue-primary); font-size: 0.9rem; }
        .item-info p { 
            font-size: 0.85rem; 
            color: var(--text-dim);
            background: rgba(255,255,255,0.05);
            padding: 4px 12px;
            border-radius: 10px;
            width: fit-content;
            margin-top: 5px;
        }

        .btn-edit {
            width: 40px; height: 40px; border-radius: 50%; background: rgba(59, 130, 246, 0.1);
            border: none; color: var(--blue-primary); cursor: pointer;
        }

        /* Modal */
        .modal { position: fixed; inset: 0; display: none; justify-content: center; align-items: center; z-index: 3000; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: #0f172a; border: 1px solid var(--blue-primary); border-radius: 28px; width: 100%; max-width: 450px; padding: 30px; }

        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 8px; }
        input { width: 100%; background: #1e293b; border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: white; outline: none; }

        #loader { position: fixed; inset: 0; background: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(59, 130, 246, 0.2); border-top-color: var(--blue-primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .badge { padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; }
        .badge-success { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .badge-warning { background: rgba(234, 179, 8, 0.1); color: #eab308; }

        @media (min-width: 1024px) {
            .sidebar { left: 0; }
            [dir="rtl"] .sidebar { left: auto; right: 0; }
            main { padding-left: 300px; padding-right: 20px; margin: 0; max-width: 1200px; }
            [dir="rtl"] main { padding-right: 300px; padding-left: 20px; }
            .hamburger { display: none; }
            .topbar { left: 300px; }
            [dir="rtl"] .topbar { left: 20px; right: 300px; }
        }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-logo"><i class="fa-solid fa-shield-halved"></i></h2>
        </div>
        <div class="menu-list">
            <div id="menu-dashboard" class="menu-item active" onclick="switchSection('home', this)">
                <i class="fa-solid fa-house"></i>
                <span data-i18n="nav_dashboard">Dashboard</span>
            </div>
            <div id="menu-prices" class="menu-item" onclick="switchSection('prices', this)">
                <i class="fa-solid fa-tags"></i>
                <span data-i18n="nav_prices">Price Management</span>
            </div>
            <div id="menu-logs" class="menu-item" onclick="switchSection('history', this)">
                <i class="fa-solid fa-history"></i>
                <span data-i18n="nav_history">Sourcing Logs</span>
            </div>
        </div>
        <div style="margin-top: auto;">
            <div class="menu-item" onclick="toggleLanguage()">
                <i class="fa-solid fa-language"></i>
                <span id="lang-text">العربية</span>
            </div>
            <div class="menu-item" style="color: #ef4444;" onclick="window.Telegram.WebApp.close()">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span data-i18n="nav_close">Close Panel</span>
            </div>
        </div>
    </div>

    <!-- Top Bar -->
    <div class="topbar">
        <div class="hamburger" onclick="toggleSidebar()">
            <i class="fa-solid fa-bars-staggered"></i>
        </div>
        <div class="page-title" id="page-title" data-i18n="nav_dashboard">Dashboard</div>
        <div class="user-profile">
            <i class="fa-solid fa-circle-user" style="font-size: 1.5rem; color: var(--blue-primary);"></i>
        </div>
    </div>

    <main>
        <!-- Home Section -->
        <div id="section-home" class="content-section">
            <div class="grid-stats">
                <div class="stat-card">
                    <i class="fa-solid fa-database"></i>
                    <div class="stat-value" id="stat-total-sourced">0</div>
                    <div class="stat-label" data-i18n="stat_total">Total Accounts</div>
                </div>
                <div class="stat-card">
                    <i class="fa-solid fa-hourglass-half"></i>
                    <div class="stat-value" id="stat-pending">0</div>
                    <div class="stat-label" data-i18n="stat_pending">Pending Approval</div>
                </div>
            </div>

            <div class="section-header">
                <h3 data-i18n="recent_ops">Recent Operations</h3>
            </div>
            <div class="card">
                <div class="list-container" id="recent-sourced"></div>
            </div>
        </div>

        <!-- Prices Section -->
        <div id="section-prices" class="content-section" style="display: none;">
            <div class="section-header">
                <h3 data-i18n="buying_prices">Buying Prices</h3>
                <button class="btn-add" onclick="openPriceModal()">
                    <i class="fa-solid fa-plus"></i> <span data-i18n="btn_add">Add Country</span>
                </button>
            </div>
            <div class="list-container" id="price-list"></div>
        </div>

        <div id="section-history" class="content-section" style="display: none;">
            <div class="card" style="text-align: center; color: var(--text-dim);">
                <i class="fa-solid fa-folder-open" style="font-size: 3rem; margin-bottom: 15px;"></i>
                <p data-i18n="coming_soon">Coming Soon...</p>
            </div>
        </div>
    </main>

    <!-- Modal Form -->
    <div id="price-modal" class="modal" onclick="closePriceModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin-bottom: 25px; color: var(--blue-primary);" data-i18n="modal_title">Price Settings</h3>
            <div class="input-group">
                <label data-i18n="lbl_code">Country Code (numeric)</label>
                <input type="text" id="m-code" placeholder="20">
            </div>
            <div class="input-group">
                <label data-i18n="lbl_buy">Buy Price ($)</label>
                <input type="number" id="m-buy" step="0.1" placeholder="0.5">
            </div>
            <div class="input-group">
                <label data-i18n="lbl_delay">Approval Delay (min)</label>
                <input type="number" id="m-delay" placeholder="60">
            </div>
            <button class="btn-add" style="width: 100%; justify-content: center;" onclick="savePriceChanges()" data-i18n="btn_save">
                Save Changes
            </button>
            <button class="btn-add" style="width: 100%; justify-content: center; margin-top: 10px; background: #334155;" onclick="closePriceModal(null)">
                Close
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#030712';

        const translations = {
            en: {
                nav_dashboard: "Dashboard",
                nav_prices: "Buying Prices",
                nav_history: "Sourcing Logs",
                nav_close: "Close Panel",
                stat_total: "Total Accounts",
                stat_pending: "Pending Approval",
                recent_ops: "Recent Operations",
                buying_prices: "Buying Inventory",
                btn_add: "Add Country",
                btn_save: "Save Changes",
                coming_soon: "Coming Soon...",
                modal_title: "Buying Price Setup",
                lbl_code: "Country Code (numeric)",
                lbl_buy: "Buy Price ($)",
                lbl_delay: "Approval Delay (min)",
                no_ops: "No transactions found",
                buy_lbl: "Buying Price"
            },
            ar: {
                nav_dashboard: "الرئيسية",
                nav_prices: "أسعار الشراء",
                nav_history: "سجلات التوريد",
                nav_close: "إغلاق اللوحة",
                stat_total: "إجمالي الحسابات",
                stat_pending: "في انتظار التأكيد",
                recent_ops: "آخر العمليات",
                buying_prices: "قائمة الشراء",
                btn_add: "إضافة دولة",
                btn_save: "حفظ التعديلات",
                coming_soon: "قريباً...",
                modal_title: "إعداد سعر الشراء",
                lbl_code: "مفتاح الدولة (رقم)",
                lbl_buy: "سعر الشراء ($)",
                lbl_delay: "تأخير الموافقة (دقيقة)",
                no_ops: "لا توجد عمليات",
                buy_lbl: "سعر الشراء"
            }
        };

        let currentLang = localStorage.getItem('admin_lang') || 'en';

        function updateUI() {
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) el.innerText = translations[currentLang][key];
            });
            document.getElementById('lang-text').innerText = currentLang === 'en' ? 'العربية' : 'English';
            init();
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            localStorage.setItem('admin_lang', currentLang);
            updateUI();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function switchSection(id, btn) {
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            document.getElementById('section-' + id).style.display = 'block';
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            btn.classList.add('active');
            updateUI();
            if (window.innerWidth < 1024) toggleSidebar();
        }

        async function init() {
            try {
                const res = await fetch('/api/admin/sourcing/data');
                const data = await res.json();
                document.getElementById('stat-total-sourced').innerText = data.stats.total_sourced;
                document.getElementById('stat-pending').innerText = data.stats.pending_count;
                renderRecent(data.recent);
                renderPrices(data.prices);
            } catch (e) { console.error(e); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        function renderRecent(list) {
            const container = document.getElementById('recent-sourced');
            if (!list.length) { container.innerHTML = `<p style="text-align: center; color: var(--text-dim);">${translations[currentLang].no_ops}</p>`; return; }
            container.innerHTML = list.map(item => `
                <div class="list-item">
                    <div class="item-info">
                        <h4>${item.phone}</h4>
                        <p>${item.country} | <span style="color: var(--blue-primary)">$${item.buy_price}</span></p>
                    </div>
                    <span class="badge ${item.status === 'AVAILABLE' ? 'badge-success' : 'badge-warning'}">${item.status}</span>
                </div>
            `).join('');
        }

        function renderPrices(list) {
            const container = document.getElementById('price-list');
            container.innerHTML = list.map(p => `
                <div class="list-item">
                    <div class="item-info">
                        <h4><i class="fa-solid fa-location-dot"></i> ${p.name} (+${p.code})</h4>
                        <p><i class="fa-solid fa-tag"></i> ${translations[currentLang].buy_lbl}: <span style="color: var(--blue-primary); font-weight: 700;">$${p.buy_price}</span></p>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-edit" onclick="editPrice('${p.code}', ${p.buy_price}, ${p.approve_delay})">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                        <button class="btn-edit" style="background: rgba(239, 68, 68, 0.1); color: #ef4444;" onclick="deletePrice('${p.code}')">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function openPriceModal() {
            document.getElementById('m-code').value = '';
            document.getElementById('m-buy').value = '';
            document.getElementById('m-delay').value = '0';
            document.getElementById('price-modal').classList.add('active');
        }

        function editPrice(code, buy, delay) {
            document.getElementById('m-code').value = code;
            document.getElementById('m-buy').value = buy;
            document.getElementById('m-delay').value = delay;
            document.getElementById('price-modal').classList.add('active');
        }

        function closePriceModal(e) {
            if (e && e.target && e.target !== document.getElementById('price-modal')) return;
            document.getElementById('price-modal').classList.remove('active');
        }

        async function savePriceChanges() {
            const payload = {
                country_code: document.getElementById('m-code').value,
                buy_price: parseFloat(document.getElementById('m-buy').value),
                approve_delay: parseInt(document.getElementById('m-delay').value)
            };
            await fetch('/api/admin/sourcing/price/update', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            init();
            closePriceModal();
        }

        async function deletePrice(code) {
            if (!confirm(currentLang === 'ar' ? 'هل أنت متأكد من حذف هذه الدولة؟' : 'Are you sure you want to delete this country?')) return;
            try {
                await fetch(`/api/admin/prices/delete/${code}`, { method: 'DELETE' });
                init();
            } catch (e) {
                alert('Error deleting country');
            }
        }

        updateUI();
    </script>
</body>
</html>
