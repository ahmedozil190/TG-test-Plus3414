<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Store Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050505;
            --sidebar-bg: #111111;
            --glass-bg: rgba(18, 18, 18, 0.7);
            --gold-primary: #FFD700;
            --gold-glow: rgba(255, 215, 0, 0.3);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: rgba(255, 215, 0, 0.15);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [dir="rtl"] { font-family: 'Cairo', sans-serif; }
        [dir="ltr"] { font-family: 'Inter', sans-serif; }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; overflow-x: hidden; }

        .sidebar {
            width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border);
            height: 100vh; position: fixed; left: -280px; top: 0; z-index: 2000; padding: 30px 20px;
            transition: var(--transition); display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        [dir="rtl"] .sidebar { left: auto; right: -280px; border-right: none; border-left: 1px solid var(--border); box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        .sidebar.active { left: 0; }
        [dir="rtl"] .sidebar.active { right: 0; left: auto; }

        .sidebar-header { padding-bottom: 30px; border-bottom: 1px solid var(--border); margin-bottom: 30px; text-align: center; }
        .sidebar-logo { font-size: 1.5rem; font-weight: 800; color: var(--gold-primary); }

        .menu-list { list-style: none; flex: 1; }
        .menu-item {
            display: flex; align-items: center; gap: 15px; padding: 15px; border-radius: 12px;
            color: var(--text-dim); text-decoration: none; margin-bottom: 10px; transition: var(--transition); cursor: pointer;
        }
        .menu-item:hover, .menu-item.active { background: rgba(255, 215, 0, 0.05); color: var(--gold-primary); }

        .topbar {
            position: fixed; top: 20px; left: 20px; right: 20px; height: 65px;
            background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--border);
            border-radius: 20px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000;
        }

        .hamburger { font-size: 1.5rem; color: var(--gold-primary); cursor: pointer; }
        .page-title { font-size: 1.1rem; font-weight: 700; color: var(--gold-primary); }

        main { flex: 1; padding: 105px 20px 40px; max-width: 900px; margin: 0 auto; width: 100%; transition: var(--transition); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); z-index: 1500; display: none; }
        .overlay.active { display: block; }

        .grid-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--glass-bg); border: 1px solid var(--border); border-radius: 24px; padding: 25px 15px; text-align: center; }
        .stat-card i { font-size: 2rem; color: var(--gold-primary); margin-bottom: 12px; }
        .stat-value { font-size: 1.8rem; font-weight: 800; color: #fff; }
        .stat-label { font-size: 0.8rem; color: var(--text-dim); }

        .card { background: var(--glass-bg); border: 1px solid var(--border); border-radius: 24px; padding: 25px; margin-bottom: 25px; }
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .section-header h3 { font-size: 1.1rem; color: var(--gold-primary); }

        .list-container { display: flex; flex-direction: column; gap: 12px; }
        .list-item {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 18px; padding: 18px; display: flex; justify-content: space-between; align-items: center;
        }
        .item-info h4 { font-size: 0.95rem; margin-bottom: 4px; }
        .item-info p { font-size: 0.8rem; color: var(--text-dim); }

        .badge { padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; background: rgba(34, 197, 94, 0.1); color: #22c55e; }

        #loader { position: fixed; inset: 0; background: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255, 215, 0, 0.2); border-top-color: var(--gold-primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (min-width: 1024px) {
            .sidebar { left: 0; }
            [dir="rtl"] .sidebar { left: auto; right: 0; }
            main { padding-left: 300px; padding-right: 20px; margin: 0; max-width: 1200px; }
            [dir="rtl"] main { padding-right: 300px; padding-left: 20px; }
            .hamburger { display: none; }
            .topbar { left: 300px; }
            [dir="rtl"] .topbar { left: 20px; right: 300px; }
        }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-logo"><i class="fa-solid fa-crown"></i></h2>
        </div>
        <div class="menu-list">
            <div id="menu-dashboard" class="menu-item active" onclick="switchSection('home', this)">
                <i class="fa-solid fa-house"></i>
                <span data-i18n="nav_dashboard">Dashboard</span>
            </div>
            <div id="menu-users" class="menu-item" onclick="switchSection('users', this)">
                <i class="fa-solid fa-users"></i>
                <span data-i18n="nav_users">Customers</span>
            </div>
            <div id="menu-prices" class="menu-item" onclick="switchSection('prices', this)">
                <i class="fa-solid fa-tags"></i>
                <span data-i18n="nav_prices">Selling Prices</span>
            </div>
            <div id="menu-sales" class="menu-item" onclick="switchSection('sales', this)">
                <i class="fa-solid fa-cart-shopping"></i>
                <span data-i18n="nav_sales">Sales History</span>
            </div>
        </div>
        <div style="margin-top: auto;">
            <div class="menu-item" onclick="toggleLanguage()">
                <i class="fa-solid fa-language"></i>
                <span id="lang-text">العربية</span>
            </div>
            <div class="menu-item" style="color: #ef4444;" onclick="window.Telegram.WebApp.close()">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span data-i18n="nav_close">Close Panel</span>
            </div>
        </div>
    </div>

    <!-- Top Bar -->
    <div class="topbar">
        <div class="hamburger" onclick="toggleSidebar()">
            <i class="fa-solid fa-bars-staggered"></i>
        </div>
        <div class="page-title" id="page-title" data-i18n="nav_dashboard">Dashboard</div>
        <div class="user-profile">
            <i class="fa-solid fa-crown" style="font-size: 1.5rem; color: var(--gold-primary);"></i>
        </div>
    </div>

    <main>
        <!-- Home Section -->
        <div id="section-home" class="content-section">
            <div class="grid-stats">
                <div class="stat-card">
                    <i class="fa-solid fa-users"></i>
                    <div class="stat-value" id="stat-total-users">0</div>
                    <div class="stat-label" data-i18n="stat_users">Total Clients</div>
                </div>
                <div class="stat-card">
                    <i class="fa-solid fa-money-bill-trend-up"></i>
                    <div class="stat-value" id="stat-sales-count">0</div>
                    <div class="stat-label" data-i18n="stat_sales">Total Sales</div>
                </div>
            </div>

            <div class="section-header">
                <h3 data-i18n="recent_sales">Recent Sales</h3>
            </div>
            <div class="card">
                <div class="list-container" id="recent-sales"></div>
            </div>
        </div>

        <div id="section-users" class="content-section" style="display: none;">
            <div class="section-header">
                <h3 data-i18n="customers_list">Customers List</h3>
            </div>
            <div class="list-container" id="user-list"></div>
        </div>

        <div id="section-prices" class="content-section" style="display: none;">
            <div class="section-header">
                <h3 data-i18n="nav_prices">Selling Prices</h3>
                <button class="btn-add" onclick="openPriceModal()" style="background: var(--gold-primary); color: #000; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; cursor: pointer;">
                    <i class="fa-solid fa-plus"></i> <span data-i18n="btn_add">Add Price</span>
                </button>
            </div>
            <div class="list-container" id="price-list"></div>
        </div>

        <div id="section-sales" class="content-section" style="display: none;">
            <div class="card" style="text-align: center; color: var(--text-dim);">
                <i class="fa-solid fa-chart-line" style="font-size: 3rem; margin-bottom: 15px;"></i>
                <p data-i18n="coming_soon">Coming Soon...</p>
            </div>
        </div>
    </main>

    <!-- Modal for Store Pricing -->
    <div id="price-modal" class="modal" onclick="closePriceModal(event)" style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 3000;">
        <div class="modal-content" onclick="event.stopPropagation()" style="background: #111; border: 1px solid var(--gold-primary); border-radius: 20px; padding: 30px; width: 90%; max-width: 400px;">
            <h3 style="color: var(--gold-primary); margin-bottom: 20px;" data-i18n="modal_title">Store Price Settings</h3>
            <div style="margin-bottom: 15px;">
                <label style="display: block; color: var(--text-dim); font-size: 0.8rem; margin-bottom: 5px;" data-i18n="lbl_code">Country Code</label>
                <input type="text" id="m-code" style="width: 100%; background: #222; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px;">
            </div>
            <div style="margin-bottom: 25px;">
                <label style="display: block; color: var(--text-dim); font-size: 0.8rem; margin-bottom: 5px;" data-i18n="lbl_sell">Selling Price ($)</label>
                <input type="number" id="m-price" step="0.1" style="width: 100%; background: #222; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px;">
            </div>
            <button onclick="saveStorePrice()" style="width: 100%; padding: 12px; background: var(--gold-primary); color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;" data-i18n="btn_save">Save</button>
            <button onclick="closePriceModal()" style="width: 100%; padding: 12px; background: transparent; color: var(--text-dim); border: none; margin-top: 10px; cursor: pointer;" data-i18n="nav_close">Cancel</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#050505';

        const translations = {
            en: {
                nav_dashboard: "Dashboard",
                nav_users: "Customers",
                nav_prices: "Store Prices",
                nav_sales: "Sales History",
                nav_close: "Close Panel",
                stat_users: "Total Clients",
                stat_sales: "Total Sales",
                recent_sales: "Recent Sales",
                customers_list: "Customers List",
                coming_soon: "Full Analytics Coming Soon...",
                no_sales: "No sales recorded yet",
                service_lbl: "Account for",
                by_user: "By User",
                btn_add: "Add Price",
                modal_title: "Selling Price Manager",
                lbl_code: "Code",
                lbl_sell: "Price ($)",
                btn_save: "Save Selling Price"
            },
            ar: {
                nav_dashboard: "الرئيسية",
                nav_users: "إدارة العملاء",
                nav_prices: "أسعار البيع",
                nav_sales: "سجل المبيعات",
                nav_close: "إغلاق اللوحة",
                stat_users: "إجمالي العملاء",
                stat_sales: "إجمالي المبيعات",
                recent_sales: "آخر المبيعات",
                customers_list: "قائمة العملاء",
                coming_soon: "التقارير التفصيلية قريباً...",
                no_sales: "لا توجد مبيعات حالياً",
                service_lbl: "حساب",
                by_user: "بواسطة",
                btn_add: "إضافة سعر",
                modal_title: "إدارة أسعار البيع",
                lbl_code: "الكود",
                lbl_sell: "السعر ($)",
                btn_save: "حفظ سعر البيع"
            }
        };

        let currentLang = localStorage.getItem('admin_lang') || 'en';

        function updateUI() {
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) el.innerText = translations[currentLang][key];
            });
            document.getElementById('lang-text').innerText = currentLang === 'en' ? 'العربية' : 'English';
            init();
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            localStorage.setItem('admin_lang', currentLang);
            updateUI();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function switchSection(id, btn) {
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            document.getElementById('section-' + id).style.display = 'block';
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            btn.classList.add('active');
            updateUI();
            if (window.innerWidth < 1024) toggleSidebar();
        }

        async function init() {
            try {
                const res = await fetch('/api/admin/store/data');
                const data = await res.json();
                document.getElementById('stat-total-users').innerText = data.stats.user_count;
                document.getElementById('stat-sales-count').innerText = data.transactions.length;
                renderSales(data.transactions);
                renderUsers(data.users);
                
                // Fetch prices list
                const pRes = await fetch('/api/admin/sourcing/data');
                const pData = await pRes.json();
                renderPrices(pData.prices);
            } catch (e) { console.error(e); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        function renderSales(list) {
            const container = document.getElementById('recent-sales');
            if (!list || !list.length) { container.innerHTML = `<p style="text-align: center; color: var(--text-dim);">${translations[currentLang].no_sales}</p>`; return; }
            container.innerHTML = list.map(item => `
                <div class="list-item">
                    <div class="item-info">
                        <h4>Order Recorded</h4>
                        <p>${translations[currentLang].by_user}: ${item.buyer_id} | <span style="color: var(--gold-primary)">$${item.price}</span></p>
                    </div>
                    <span class="badge">Success</span>
                </div>
            `).join('');
        }

        function renderUsers(list) {
            const container = document.getElementById('user-list');
            container.innerHTML = list.map(u => `
                <div class="list-item">
                    <div class="item-info">
                        <h4>AID: ${u.id}</h4>
                        <p>Joined: ${u.join_date} | Balance: <span style="color: var(--gold-primary)">$${u.balance}</span></p>
                    </div>
                </div>
            `).join('');
        }

        function renderPrices(list) {
            const container = document.getElementById('price-list');
            container.innerHTML = list.map(p => `
                <div class="list-item">
                    <div class="item-info">
                        <h4>${p.name} (+${p.code})</h4>
                        <p>Selling Price: <span style="color: var(--gold-primary)">$${p.price}</span></p>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button onclick="editPrice('${p.code}', ${p.price})" style="background: rgba(255,215,0,0.1); border: none; color: var(--gold-primary); padding: 8px; border-radius: 50%; cursor: pointer;">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                        <button onclick="deletePrice('${p.code}')" style="background: rgba(239, 68, 68, 0.1); border: none; color: #ef4444; padding: 8px; border-radius: 50%; cursor: pointer;">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function openPriceModal() {
            document.getElementById('m-code').value = '';
            document.getElementById('m-price').value = '';
            document.getElementById('price-modal').style.display = 'flex';
        }

        function editPrice(code, price) {
            document.getElementById('m-code').value = code;
            document.getElementById('m-price').value = price;
            document.getElementById('price-modal').style.display = 'flex';
        }

        function closePriceModal() {
            document.getElementById('price-modal').style.display = 'none';
        }

        async function saveStorePrice() {
            const payload = {
                country_code: document.getElementById('m-code').value,
                country_name: "Unknown", 
                price: parseFloat(document.getElementById('m-price').value),
                buy_price: 0,
                approve_delay: 0
            };
            await fetch('/api/admin/prices/update', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            init();
            closePriceModal();
        }

        async function deletePrice(code) {
            if (!confirm(currentLang === 'ar' ? 'هل أنت متأكد من حذف هذه الدولة؟' : 'Are you sure you want to delete this country?')) return;
            try {
                await fetch(`/api/admin/prices/delete/${code}`, { method: 'DELETE' });
                init();
            } catch (e) {
                alert('Error deleting country');
            }
        }

        updateUI();
    </script>
</body>
</html>
